spring:
  application:
    name: keep-booking

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/keepbooking}
    username: ${DB_USER:keepbooking}
    password: ${DB_PASSWORD:keepbooking}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: public
        jdbc:
          time_zone: UTC

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never

app:
  jwt:
    secret: ${JWT_SECRET:keep-booking-dev-secret-key-must-be-at-least-32-chars!!}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
  tokens:
    email-verification-expiration-ms: ${EMAIL_VERIFICATION_EXPIRATION_MS:86400000}
    password-reset-expiration-ms: ${PASSWORD_RESET_EXPIRATION_MS:3600000}
  booking:
    pending-timeout-ms: ${BOOKING_PENDING_TIMEOUT_MS:1800000}
    scheduler-interval-ms: ${BOOKING_SCHEDULER_INTERVAL_MS:60000}
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    public-url: ${STORAGE_PUBLIC_URL:http://localhost:9000}
    region: ${STORAGE_REGION:us-east-1}
    access-key: ${STORAGE_ACCESS_KEY:keepbooking}
    secret-key: ${STORAGE_SECRET_KEY:keepbooking123}
    bucket: ${STORAGE_BUCKET:keepbooking}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    general-limit: ${RATE_LIMIT_GENERAL:100}
    general-window-ms: ${RATE_LIMIT_GENERAL_WINDOW_MS:60000}
    auth-limit: ${RATE_LIMIT_AUTH:10}
    auth-window-ms: ${RATE_LIMIT_AUTH_WINDOW_MS:60000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
  default-produces-media-type: application/json

logging:
  level:
    com.keepbooking: INFO
    org.springframework.security: WARN
    liquibase: INFO
